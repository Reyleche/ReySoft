<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReySoft Coco & Caña</title>
  <style>
    body {
      margin: 0;
      font-family: "Poppins", "Segoe UI", sans-serif;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .shell {
      width: 420px;
      height: 260px;
      background: radial-gradient(circle at top, #eaf7ef 0%, #d6efe1 42%, #c5e7d3 100%);
      border-radius: 26px;
      box-shadow: 0 30px 60px rgba(12, 62, 36, 0.35);
      display: grid;
      place-items: center;
      position: relative;
      overflow: hidden;
    }
    .glow {
      position: absolute;
      width: 320px;
      height: 320px;
      background: radial-gradient(circle, rgba(34, 197, 94, 0.35), rgba(34, 197, 94, 0));
      filter: blur(4px);
      animation: pulse 2.6s ease-in-out infinite;
    }
    .logo-wrap {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: #0f172a;
      display: grid;
      place-items: center;
      box-shadow: 0 18px 28px rgba(15, 23, 42, 0.35);
    }
    .brand {
      position: absolute;
      bottom: 18px;
      left: 0;
      right: 0;
      text-align: center;
      color: rgba(15, 23, 42, 0.9);
      font-weight: 700;
      letter-spacing: 0.5px;
      font-size: 18px;
    }
    .brand small {
      display: block;
      font-weight: 600;
      letter-spacing: 0.8px;
      font-size: 12px;
      opacity: 0.7;
      margin-top: 4px;
    }
    .logo {
      width: 92px;
      height: 92px;
      object-fit: contain;
      border-radius: 12px;
      background: #ffffff;
      padding: 8px;
    }
    .fallback {
      width: 92px;
      height: 92px;
      border-radius: 12px;
      background: linear-gradient(140deg, #22c55e, #16a34a);
      display: grid;
      place-items: center;
      color: #0f172a;
      font-weight: 800;
      letter-spacing: 0.5px;
    }
    .mark {
      width: 54px;
      height: 54px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: rgba(15, 23, 42, 0.08);
      box-shadow: inset 0 0 0 2px rgba(15, 23, 42, 0.12);
      font-size: 22px;
      line-height: 1;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(0.9); opacity: 0.7; }
      50% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="glow"></div>
    <div class="logo-wrap">
      <img id="logo" class="logo" alt="Coco y Cana" />
      <div id="logo-fallback" class="fallback" hidden>
        <div class="mark">RS</div>
      </div>
    </div>
    <div class="brand">ReySoft<small>Coco & Caña</small></div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const logoPath = params.get('logo');
    const logoEl = document.getElementById('logo');
    const fallbackEl = document.getElementById('logo-fallback');
    if (logoPath) {
      logoEl.src = logoPath;
      logoEl.onerror = () => {
        logoEl.hidden = true;
        fallbackEl.hidden = false;
      };
    } else {
      logoEl.hidden = true;
      fallbackEl.hidden = false;
    }
  </script>
</body>
</html>
